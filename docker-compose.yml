services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: lsauto
      POSTGRES_PASSWORD: LSauto2024secure
      POSTGRES_DB: lsauto
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lsauto -d lsauto"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: always
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://lsauto:LSauto2024secure@db:5432/lsauto
      JWT_SECRET: ${JWT_SECRET}
      ALLOWED_ORIGIN: https://lsautohub.ru
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads

volumes:
  postgres_data:
  uploads_data:
